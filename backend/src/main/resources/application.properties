spring.application.name=backend
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration


spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}
frontend.url=${FRONTEND_URL}

judge0.url=${JUDGE0_URL}
judge0.api-key=${JUDGE0_API_KEY}
judge0.host=${JUDGE0_HOST}
email-verification.url=${EMAIL_VERIFICATION_URL}
email-verification.host=${EMAIL_VERIFICATION_HOST}
email-verification.api-key=${EMAIL_VERIFICATION_API_KEY}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
management.endpoints.web.base-path=/actuator

logging.level.root=WARN
logging.level.com.codequest=INFO

server.port=${PORT:8080}
spring.jpa.open-in-view=false

spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000
