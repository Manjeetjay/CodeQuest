name: Keep Render Service Alive

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:        

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -s --retry 5 --retry-delay 5 https://codequest-1299.onrender.com/api/health > /dev/null
